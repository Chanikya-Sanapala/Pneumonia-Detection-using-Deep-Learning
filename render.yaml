services:
  - type: web
    name: pneumonia-detection-ai
    runtime: python
    buildCommand: pip install -r requirements.txt && python download_model.py
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --timeout 180 --workers 1 --preload
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: MALLOC_TRIM_THRESHOLD_
        value: "100000"
